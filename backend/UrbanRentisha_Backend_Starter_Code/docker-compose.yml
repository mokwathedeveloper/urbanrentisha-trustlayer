version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: urbanrentisha-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: urbanrentisha
      POSTGRES_PASSWORD: urbanrentisha
      POSTGRES_DB: urbanrentisha
    ports:
      - "5432:5432"
    volumes:
      - urbanrentisha_pg:/var/lib/postgresql/data

volumes:
  urbanrentisha_pg:
